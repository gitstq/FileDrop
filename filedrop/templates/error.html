<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            padding: 60px 40px;
            max-width: 500px;
        }
        .error-code {
            font-size: 120px;
            font-weight: 800;
            color: #e0e0e0;
            line-height: 1;
            margin-bottom: 16px;
        }
        .error-message {
            font-size: 20px;
            color: #666;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .error-detail {
            font-size: 14px;
            color: #999;
            background: #f8f9fa;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 24px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 12px 28px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn:hover { background: #5a6fd6; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">{{status_code}}</div>
        <div class="error-message">{{message}}</div>
        <a href="/" class="btn">&#8592; 返回首页</a>
    </div>
</body>
</html>
